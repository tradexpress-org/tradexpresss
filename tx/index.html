<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=../" />
    <link rel="canonical" href="../" />
    <title>TX Alias</title>
</head><!-- TradeExpress Productivity Suite -->
<div class="tx-productivity-row" style="display: flex; gap: 24px; margin-top: 40px; flex-wrap: wrap;">
    
    <!-- 1. Customs Calendar Component -->
    <div class="tx-card calendar-card" style="flex: 1; min-width: 300px; background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; color: #f8fafc;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="margin: 0; color: #38bdf8; font-size: 1.2rem;">Customs Deadline Calendar</h3>
            <span id="calendar-month-year" style="font-weight: bold; font-size: 0.95rem; color: #94a3b8;"></span>
        </div>
        <!-- Simple Dynamic Mini Calendar -->
        <div id="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; font-size: 0.85rem;">
            <!-- Days header and date blocks injected by JS -->
        </div>
        <div style="margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 10px; font-size: 0.8rem; color: #94a3b8;">
            <span style="display: inline-block; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; margin-right: 5px;"></span> Today's Target Deadlines
        </div>
    </div>

    <!-- 2. Shipments & Permits To-Do List Component -->
    <div class="tx-card todo-card" style="flex: 1; min-width: 300px; background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; color: #f8fafc;">
        <h3 style="margin: 0 0 4px 0; color: #38bdf8; font-size: 1.2rem;">Logistics & Operations To-Do</h3>
        <p style="margin: 0 0 16px 0; font-size: 0.8rem; color: #64748b;">Manage permits, B/L submittals, and broker coordination.</p>
        
        <!-- Input Form -->
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="todo-input" placeholder="e.g., Submit SPSIC clearance to BPI..." 
                   style="flex: 1; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 0.85rem;">
            <button id="add-todo-btn" style="padding: 10px 16px; background: #38bdf8; border: none; border-radius: 6px; color: #0f172a; font-weight: 600; cursor: pointer;">Add</button>
        </div>

        <!-- Task List Stack -->
        <ul id="todo-list" style="list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto;">
            <!-- Dynamic items populate here -->
        </ul>
    </div>
</div>
<body>
    <p>Redirecting to the main TradExpress page...</p>
    <script>
        window.location.replace('../');
    </script>
</body>
</html>
