    <script>
    document.querySelectorAll('.trade-course-item').forEach(item => {
        const playButton = item.querySelector('.play-btn');
        if (playButton) {
            playButton.addEventListener('click', (e) => {
                e.preventDefault();
                item.classList.toggle('expanded');
                playButton.style.transform = item.classList.contains('expanded') 
                    ? 'rotate(90deg)' 
                    : 'rotate(0deg)';
            });
        }
    });
    </script>
